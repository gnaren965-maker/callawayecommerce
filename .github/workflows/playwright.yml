name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        region: 
          - US
          - Canada
          - Japan
          - Europe
          - SouthPacific
          - Latin
          - Korea
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npx playwright test \
            --project=${{ matrix.browser }} \
            --grep="${{ matrix.region }}"
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://ecommerce-app.example.com' }}
          DEBUG: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.region }}
          path: reports/html
          retention-days: 30

      - name: Upload test artifacts (screenshots/videos)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-artifacts-${{ matrix.browser }}-${{ matrix.region }}
          path: reports/artifacts
          retention-days: 7

  publish-reports:
    name: Publish Test Reports
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: all-reports

      - name: Publish test results comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            console.log('Test execution completed. Check artifacts for detailed reports.');

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Playwright tests completed! Check the artifacts for HTML reports and screenshots.'
            })
